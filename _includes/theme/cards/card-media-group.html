<style>
.media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
}
.media-card {
  background: var(--base-bg-2);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
}
.card-header {
  display: flex;
  align-items: center;
  padding: 1rem;
  background: var(--base-bg-3);
}
.broadcaster-logo {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 1rem;
}
.card-header h3 {
  margin: 0;
  font-size: 1.25rem;
}
.card-body {
  padding: 1rem;
}
.appearance-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.appearance-item {
  padding: 1rem 0;
  border-bottom: 1px solid var(--base-bg-3);
}
.appearance-item:last-child {
  border-bottom: none;
}
.meta-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.5rem;
}
.appearance-title {
  font-weight: bold;
  font-size: 1.1rem;
}
.appearance-date {
  font-size: 0.9rem;
  color: var(--base-text-2);
}
.appearance-desc {
  margin: 0 0 1rem 0;
}
.appearance-link {
  color: var(--primary-bg);
  text-decoration: none;
  font-weight: bold;
}
</style>
<div class="media-card group-card">
  <div class="card-header">
    <img src="{{ include.logo | relative_url }}" alt="{{ include.broadcaster }}" class="broadcaster-logo">
    <h3>{{ include.broadcaster }}</h3>
  </div>
  <div class="card-body">
    <ul class="appearance-list">
      {% for appearance in include.appearances %}
      <li class="appearance-item">
        <div class="meta-row">
          <span class="appearance-title">{{ appearance.title }}</span>
          <span class="appearance-date">{{ appearance.date | date: "%b %Y" }}</span>
        </div>
        <p class="appearance-desc">{{ appearance.desc }}</p>
        <a href="{{ appearance.link }}" class="appearance-link" target="_blank" rel="noopener noreferrer">
          Watch/Listen &rarr;
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
